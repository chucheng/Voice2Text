name: Voice2Text
options:
  bundleIdPrefix: com.voice2text
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

targets:
  Voice2Text:
    type: application
    platform: macOS
    sources:
      - Voice2Text
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: Voice2Text/Voice2Text.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.voice2text.Voice2Text
        MARKETING_VERSION: "2.8.1"
        CURRENT_PROJECT_VERSION: "26"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: true
        SWIFT_OBJC_BRIDGING_HEADER: Voice2Text/Voice2Text-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Whisper/include"
          - "$(PROJECT_DIR)/LlamaCpp/include"
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Whisper/lib"
          - "$(PROJECT_DIR)/LlamaCpp/lib"
        OTHER_LDFLAGS:
          - "-lwhisper"
          - "-lllama"
          - "-lggml"
          - "-lggml-base"
          - "-lggml-cpu"
          - "-lggml-metal"
          - "-lggml-blas"
          - "-lc++"
    dependencies:
      - sdk: Accelerate.framework
      - sdk: Carbon.framework
      - sdk: CoreML.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: Security.framework
    info:
      path: Voice2Text/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSHumanReadableCopyright: "Copyright © 2025-2026 Chucheng Hsieh. GPL v3.0 License."
        NSMicrophoneUsageDescription: "Voice2Text needs microphone access to record audio for transcription."
        NSSpeechRecognitionUsageDescription: "Voice2Text uses speech recognition to transcribe your voice."
        NSAppTransportSecurity:
          NSExceptionDomains:
            sheincorp.cn:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true

  Voice2TextTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Voice2TextTests
    dependencies:
      - target: Voice2Text
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Voice2Text.app/Contents/MacOS/Voice2Text"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Whisper/include"
          - "$(PROJECT_DIR)/LlamaCpp/include"
